# Nginx Advanced System Design Configuration

error_log logs/error.log;
pid nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format main_ext '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        'RT=$request_time URT=$upstream_response_time RID=$request_id CACHE=$upstream_cache_status ENV=$active_env';

    access_log logs/access.log main_ext;

    # SYSTEM DESIGN: BLUE/GREEN DEPLOYMENT SWITCH
    # Priority: Header X-Target-Env > A/B Split (10% Green) > Default [Blue]
    
    # 1. Randomly split clients based on IP (Canary / A/B Test)
    split_clients "${remote_addr}" $ab_testing_group {
        10%     "green";
        *       "blue";
    }

    # 2. Determine active environment (Header overrides random split)
    map $http_x_target_env $active_env {
        "green"  "green";
        "blue"   "blue";
        default  $ab_testing_group;
    }

    map $active_env $selected_upstream {
        "blue"   backend_blue;
        "green"  backend_green;
    }

    upstream backend_blue {
        server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8082 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream backend_green {
        server 127.0.0.1:8084 max_fails=3 fail_timeout=30s;
    }

    # PERFORMANCE & SECURITY: LIMITS
    client_max_body_size 10M;
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # PROXY TIMEOUTS
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;

    # Rest of shared config...
    map $host $maintenance_mode { default 0; } # Set to 1 to enable maintenance
    map $http_x_premium_key $limit_key { "premium-secret" ""; default $binary_remote_addr; }
    limit_req_zone $limit_key zone=api_limit:10m rate=1r/s;
    
    # NETWORK PERFORMANCE
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # FILE CACHE (Static Assets)
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # SSL OPTIMIZATIONS
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;  # about 40,000 sessions
    ssl_session_tickets off;

    # PERFORMANCE: GZIP COMPRESSION
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript;

    # SECURITY: HIDE VERSION
    server_tokens off;

    types_hash_max_size 2048;
    proxy_cache_path cache levels=1:2 keys_zone=my_cache:10m max_size=100m inactive=60m use_temp_path=off;
    client_body_temp_path temp/client_body;
    proxy_temp_path temp/proxy;
    fastcgi_temp_path temp/fastcgi;
    uwsgi_temp_path temp/uwsgi;
    scgi_temp_path temp/scgi;

    # FRONTEND GATEWAY (8080)
    server {
        listen 8080 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate ../certs/nginx-selfsigned.crt;
        ssl_certificate_key ../certs/nginx-selfsigned.key;

        include includes/security_headers.conf;

        # MAINTENANCE MODE CHECK
        if ($maintenance_mode) {
            return 503;
        }
        error_page 503 @maintenance;
        location @maintenance {
            rewrite ^(.*)$ /maintenance.html break;
            root html;
        }

        # CUSTOM ERROR PAGES
        error_page 404 /404.html;
        error_page 500 502 503 504 /maintenance.html;
        location = /maintenance.html {
            root html;
            internal;
        }

        # IGNORE FAVICON LOGS
        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }

        # BROWSER CACHING FOR ASSETS
        location ~* \.(css|js|jpg|jpeg|png|gif|ico)$ {
            root html;
            expires 1d;
            add_header Cache-Control "public, no-transform";
        }

        # SYSTEM DESIGN: SECURE LINK PROTECTION
        # Protects /secure/ files with a token and expiry
        location /secure/ {
            secure_link $arg_st,$arg_e;
            secure_link_md5 "secret_key$uri$arg_e";

            if ($secure_link = "") { return 403; }
            if ($secure_link = "0") { return 410; } # Expired

            root html;
        }

        location / {
            root html;
            index index.html;
        }
    }

    # API GATEWAY (8443)
    server {
        listen 8443 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate ../certs/nginx-selfsigned.crt;
        ssl_certificate_key ../certs/nginx-selfsigned.key;

        include includes/security_headers.conf;

        # SECURITY: BASIC WAF (Web Application Firewall)
        # Block common SQL Injection and XSS patterns
        set $block_request 0;
        if ($query_string ~ "union.*select.*\(|union.*all.*select") { set $block_request 1; }
        if ($query_string ~ "root\:") { set $block_request 1; }
        if ($query_string ~ "(\.\./|\.\.)") { set $block_request 1; }
        if ($query_string ~ "<script>|alert\(") { set $block_request 1; }
        
        if ($block_request = 1) {
            return 403 "Blocked by WAF";
        }
        
        # RATE LIMIT CONFIG
        limit_req_status 429;
        error_page 429 /limit.html;
        location = /limit.html {
            root html;
            internal;
        }

        # BACKEND ERROR HANDLING
        error_page 500 502 503 504 /maintenance.html;
        location = /maintenance.html {
            root html;
            internal;
        }
        
        location /api {
            limit_req zone=api_limit burst=5 nodelay;
            auth_basic "Restricted API";
            auth_basic_user_file /home/uday/nginx/conf/.htpasswd;
            
            include includes/cors.conf;
            include includes/proxy_params.conf;

            proxy_cache my_cache;
            proxy_cache_valid 200 10s;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_background_update on;

            add_header X-Cache-Status $upstream_cache_status always;
            add_header X-Environment $active_env always;

            # Route to the selected Blue or Green environment
            proxy_pass http://$selected_upstream;
        }

        location /status {
            stub_status;
        }
    }
}
